<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Prism · two-line embed</title>
    <style>
      html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
      #viz { position: fixed; inset: 0; width: 100vw; height: 100vh; }
      .caption {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        color: #e8eaed; font: 13px/1.4 system-ui, -apple-system, sans-serif;
        background: rgba(8, 10, 14, 0.7); padding: 10px 14px; border-radius: 4px;
        backdrop-filter: blur(8px);
      }
      .caption code { font-family: ui-monospace, monospace; color: #3dffe5; }
    </style>
  </head>
  <body>
    <div id="viz"></div>

    <div class="caption">
      <strong>Prism · two-line embed</strong><br/>
      <code>new PrismPlayer({ container: "viz" })</code><br/>
      Click anywhere to enable audio, then play any music.
    </div>

    <!-- Local-workspace import. After `npm publish`, swap to:
         import { PrismPlayer } from "https://esm.sh/@tensordoc/prism";  -->
    <script type="module">
      import { PrismPlayer } from "@tensordoc/prism";

      // Read ?g=<short_id> so the demo doubles as a share-URL preview.
      const shareToken = new URLSearchParams(location.search).get("g");

      const player = new PrismPlayer({
        container: "viz",
        graph: shareToken ?? undefined,
      });

      // First user gesture resumes the AudioContext (browser policy).
      const resume = () => {
        if (player.audioCtx.state === "suspended") player.audioCtx.resume();
      };
      window.addEventListener("pointerdown", resume, { once: true });
      window.addEventListener("keydown", resume, { once: true });

      // Expose for console testing — try player.connectAudio("mic"),
      // player.connectImage(["https://picsum.photos/1280/720"]), etc.
      window.player = player;
    </script>
  </body>
</html>
