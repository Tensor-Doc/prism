<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>@tensordoc/prism — two-line embed</title>
    <style>
      html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
      #viz { position: fixed; inset: 0; width: 100vw; height: 100vh; }

      .caption {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        color: #e8eaed; font-size: 13px; line-height: 1.4;
        background: rgba(8, 10, 14, 0.78); padding: 12px 16px; border-radius: 6px;
        backdrop-filter: blur(10px);
        max-width: 360px;
      }
      .caption h1 { margin: 0 0 6px; font-size: 14px; font-weight: 600; color: #3dffe5; }
      .caption code { font-family: ui-monospace, monospace; color: #3dffe5; }
      .caption a { color: #3dffe5; }
      .caption ol { margin: 8px 0 0 18px; padding: 0; }
      .caption li { margin: 4px 0; }

      .controls {
        position: fixed; bottom: 16px; left: 16px; z-index: 10;
        display: flex; gap: 8px; flex-wrap: wrap;
      }
      .controls button {
        background: rgba(8, 10, 14, 0.78);
        color: #e8eaed;
        border: 1px solid rgba(255,255,255,0.1);
        padding: 8px 12px;
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        cursor: pointer;
        backdrop-filter: blur(10px);
      }
      .controls button:hover { background: rgba(61, 255, 229, 0.18); border-color: rgba(61, 255, 229, 0.5); }
    </style>
  </head>
  <body>
    <div id="viz"></div>

    <div class="caption">
      <h1>@tensordoc/prism</h1>
      Two-line audio-reactive visualizer.
      <ol>
        <li>Click anywhere to enable audio</li>
        <li>Play any music in another tab</li>
        <li>Try the buttons below to swap sources</li>
      </ol>
      <p style="margin: 10px 0 0; opacity: 0.7;">
        Repo: <a href="https://github.com/Tensor-Doc/prism" target="_blank">Tensor-Doc/prism</a> ·
        Site: <a href="https://prism.scott.ai" target="_blank">prism.scott.ai</a>
      </p>
    </div>

    <div class="controls">
      <button id="btn-mic">audio: mic</button>
      <button id="btn-tab">audio: tab</button>
      <button id="btn-images">image feed: NASA-style</button>
      <button id="btn-random">load random preset</button>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
