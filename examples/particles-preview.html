<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Prism · particles preview</title>
    <style>
      html, body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: ui-sans-serif, system-ui, sans-serif; color: #ccc; }
      #stage { display: block; position: fixed; inset: 0; width: 100vw; height: 100vh; }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        background: rgba(0,0,0,0.55);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 5;
        pointer-events: none;
      }
      #hud code { color: #9cf; }
      #tab-btn {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: rgba(20, 30, 40, 0.85);
        color: #cce8ff;
        border: 1px solid rgba(120, 180, 220, 0.6);
        padding: 10px 16px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        z-index: 6;
        backdrop-filter: blur(4px);
      }
      #tab-btn:hover { background: rgba(30, 50, 70, 0.95); }
      #tab-btn[data-active] {
        background: rgba(40, 110, 60, 0.9);
        border-color: rgba(120, 220, 150, 0.7);
        color: #d8ffe2;
      }
      #tab-btn[data-active]::before { content: "● "; color: #5cff89; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="hud">
      Particles preview ·
      <code>?preset=&lt;url&gt;</code> ·
      <span id="name">loading…</span> ·
      <span id="fps">— fps</span>
    </div>
    <button id="tab-btn">Listen to tab</button>

    <script type="module">
      import { createParticlesBackground } from "@tensordoc/prism";

      const params = new URLSearchParams(location.search);
      const presetUrl = params.get("preset") ?? "/presets/particles/refik-fluid-flora.json";

      const canvas = document.getElementById("stage");
      const nameEl = document.getElementById("name");
      const fpsEl = document.getElementById("fps");

      // Audio: try the recorded test signal, fall back to silent (the
      // shader still drifts on curl noise alone). Auto-play policy in
      // Chrome blocks until first gesture — we attach a one-shot
      // pointer listener to resume.
      const audioCtx = new AudioContext();
      let audioSource;
      try {
        const res = await fetch("/audio/test-signal.webm");
        if (res.ok) {
          const buf = await res.arrayBuffer();
          const audio = await audioCtx.decodeAudioData(buf);
          const node = audioCtx.createBufferSource();
          node.buffer = audio;
          node.loop = true;
          node.start(0, Math.random() * audio.duration);
          audioSource = node;
        }
      } catch (err) {
        console.warn("[preview] test-signal load failed:", err.message);
      }
      if (!audioSource) audioSource = audioCtx.createGain();

      window.addEventListener("pointerdown", () => audioCtx.resume(), { once: true });

      const bg = createParticlesBackground(audioCtx, canvas, audioSource);
      try {
        const name = await bg.loadFromUrl(presetUrl);
        nameEl.textContent = name;
      } catch (err) {
        console.error("[preview] preset load failed:", err);
        nameEl.textContent = `load failed: ${err.message}`;
      }

      // Tab-audio button. Browser requires getDisplayMedia to include
      // a video track even when we only want audio, so we ask for both
      // and discard the video. Picking the right tab in Chrome's share
      // picker (and checking "Share tab audio") is on the user.
      const tabBtn = document.getElementById("tab-btn");
      let tabStream = null;
      tabBtn.addEventListener("click", async () => {
        if (tabStream) {
          // Already listening — stop, reconnect the silent/default source.
          for (const t of tabStream.getTracks()) t.stop();
          tabStream = null;
          bg.connectAudio(audioSource);
          tabBtn.textContent = "Listen to tab";
          tabBtn.removeAttribute("data-active");
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({
            audio: {
              echoCancellation: false,
              noiseSuppression: false,
              autoGainControl: false,
            },
            video: { width: 1280, height: 720, frameRate: 30 },
          });
          const audioTracks = stream.getAudioTracks();
          if (audioTracks.length === 0) {
            for (const t of stream.getTracks()) t.stop();
            alert("No audio in that share. Pick a tab and check 'Share tab audio'.");
            return;
          }
          // Drop the video track — we only want audio for the visualizer.
          for (const t of stream.getVideoTracks()) t.stop();
          await audioCtx.resume();
          const node = audioCtx.createMediaStreamSource(new MediaStream(audioTracks));
          bg.connectAudio(node);
          tabStream = stream;
          tabBtn.textContent = "Stop tab audio";
          tabBtn.setAttribute("data-active", "");
          // If the user revokes sharing from the browser UI, snap back.
          audioTracks[0].addEventListener("ended", () => {
            tabStream = null;
            bg.connectAudio(audioSource);
            tabBtn.textContent = "Listen to tab";
            tabBtn.removeAttribute("data-active");
          });
        } catch (err) {
          console.warn("[preview] tab capture failed:", err);
        }
      });

      // Simple FPS counter.
      let frames = 0;
      let last = performance.now();
      const tick = () => {
        frames++;
        const now = performance.now();
        if (now - last > 500) {
          const fps = (frames * 1000) / (now - last);
          fpsEl.textContent = `${fps.toFixed(0)} fps`;
          frames = 0;
          last = now;
        }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    </script>
  </body>
</html>
