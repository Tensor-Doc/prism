<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Prism capture · milkdrop</title>
    <link rel="icon" href="data:," />
    <style>
      html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
      #vis { display: block; position: fixed; inset: 0; width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <canvas id="vis"></canvas>
    <script type="module">
      // capture-pages/milkdrop.html — the harness Puppeteer navigates to.
      // Contract with the capture script:
      //   window.__prismReady              true once first frames are paintable
      //   window.__prismStartCapture(ms)   begin recording for `ms` milliseconds
      //   window.__prismCaptureReady       true once recording is encoded
      //   window.__prismVideoBase64        base64-encoded webm
      //
      // Audio: a backing track is fetched (or generated as pink noise if
      // missing) and fed into butterchurn's analyser so the capture reflects
      // a realistic audio-reactive moment.

      // Vite handles the CJS/UMD interop when we import by package name
      // rather than a direct path. Direct paths bypass Vite's optimizer
      // and the UMD files don't have a real ESM default export.
      // milkdrop-preset-converter uses named exports (no default).
      import butterchurnRaw from "butterchurn";
      import presetsRaw from "butterchurn-presets";
      import { convertPreset } from "milkdrop-preset-converter";

      const unwrap = (m) => (m && typeof m === "object" && "default" in m ? m.default : m);
      const butterchurn = unwrap(butterchurnRaw);
      const presets = unwrap(presetsRaw);

      const canvas = document.getElementById("vis");
      const params = new URLSearchParams(location.search);
      // Two modes: ?preset=<name> looks up in the bundled npm pack;
      // ?presetUrl=<path> fetches a raw .milk and converts it. The URL
      // mode is what the M5b annotator uses against ingested favorites.
      const presetName = params.get("preset");
      const presetUrl = params.get("presetUrl");
      let presetData;
      if (presetUrl) {
        console.log("[capture] fetching", presetUrl);
        const res = await fetch(presetUrl);
        if (!res.ok) throw new Error(`fetch ${presetUrl} → ${res.status}`);
        const milkText = await res.text();
        console.log("[capture] .milk size", milkText.length);
        presetData = await convertPreset(milkText);
        console.log("[capture] converted keys", Object.keys(presetData).join(","));
      } else if (presetName) {
        const presetMap = presets.getPresets();
        presetData = presetMap[presetName];
        if (!presetData) throw new Error(`unknown preset: ${presetName}`);
      } else {
        throw new Error("missing ?preset= or ?presetUrl= query parameter");
      }

      const W = window.innerWidth;
      const H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;

      // Audio source: prefer the user-recorded test signal (e.g. Pink Floyd
      // "Money" 1:10-1:40) at /audio/test-signal.webm. Falls back to the
      // procedural pink-noise synth if that file isn't present.
      const audioCtx = new AudioContext();

      async function tryRecordedTestSignal() {
        try {
          const res = await fetch("/audio/test-signal.webm");
          if (!res.ok) return null;
          const buf = await res.arrayBuffer();
          const audio = await audioCtx.decodeAudioData(buf);
          const node = audioCtx.createBufferSource();
          node.buffer = audio;
          node.loop = true;
          // Random starting offset so we don't always sample the same opening
          // beat of the loop in every capture.
          node.start(0, Math.random() * audio.duration);
          const gain = audioCtx.createGain();
          gain.gain.value = 1.0;
          node.connect(gain);
          console.log("[capture] using recorded test signal:", audio.duration.toFixed(1) + "s");
          return gain;
        } catch (err) {
          console.warn("[capture] failed to load /audio/test-signal.webm:", err.message);
          return null;
        }
      }

      function buildSynthSignal() {
        const gain = audioCtx.createGain();
        gain.gain.value = 0.6;
        const voices = [
          { f: 90, type: "sine", g: 0.5 },
          { f: 220, type: "triangle", g: 0.3 },
          { f: 600, type: "sawtooth", g: 0.18 },
          { f: 2400, type: "triangle", g: 0.08 },
        ];
        for (const v of voices) {
          const o = audioCtx.createOscillator();
          o.type = v.type;
          o.frequency.value = v.f;
          const og = audioCtx.createGain();
          og.gain.value = v.g;
          const lfo = audioCtx.createOscillator();
          lfo.frequency.value = 0.13 + Math.random() * 0.4;
          const lfoGain = audioCtx.createGain();
          lfoGain.gain.value = v.f * 0.05;
          lfo.connect(lfoGain).connect(o.frequency);
          o.connect(og).connect(gain);
          o.start();
          lfo.start();
        }
        setInterval(() => {
          const now = audioCtx.currentTime;
          gain.gain.cancelScheduledValues(now);
          gain.gain.setValueAtTime(gain.gain.value, now);
          gain.gain.linearRampToValueAtTime(1.1, now + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.45, now + 0.25);
        }, 700 + Math.random() * 400);
        console.log("[capture] using synthetic fallback signal");
        return gain;
      }

      const fakeSource = (await tryRecordedTestSignal()) ?? buildSynthSignal();
      // Resume on first interaction-equivalent (we're headless, so just resume).
      await audioCtx.resume();

      const visualizer = butterchurn.createVisualizer(audioCtx, canvas, {
        width: W,
        height: H,
        pixelRatio: 1,
        textureRatio: 1,
      });
      visualizer.connectAudio(fakeSource);

      // Load the shared texture pack + procedural noise textures so
      // .milk presets that sample worms / clouds / fire_* / pw_noise_*
      // / etc. actually render. Without this butterchurn only has its
      // own 6 bundled textures and most presets render black.
      try {
        const idxRes = await fetch("/textures/index.json");
        const loaded = {};
        if (idxRes.ok) {
          const manifest = await idxRes.json();
          const entries = Object.entries(manifest);
          await Promise.all(entries.map(async ([key, filename]) => {
            const r = await fetch(`/textures/${encodeURIComponent(filename)}`);
            if (!r.ok) return;
            const blob = await r.blob();
            const dataUrl = await new Promise((res, rej) => {
              const fr = new FileReader();
              fr.onload = () => res(fr.result);
              fr.onerror = () => rej(fr.error);
              fr.readAsDataURL(blob);
            });
            loaded[key] = { data: dataUrl };
          }));
        }
        // Procedural Milkdrop noise — Geiss spec is 256x256, 64x64
        // cubic-filtered, 32x32 cubic-filtered RGBA random pixels.
        const mulberry32 = (seed) => {
          let s = seed >>> 0;
          return () => {
            s = (s + 0x6D2B79F5) >>> 0;
            let t = s;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        };
        const randomNoise = (w, h, seed) => {
          const c = document.createElement("canvas");
          c.width = w; c.height = h;
          const cx = c.getContext("2d");
          const img = cx.createImageData(w, h);
          const r = mulberry32(seed * 0x9E3779B9);
          for (let i = 0; i < img.data.length; i += 4) {
            img.data[i] = (r() * 256) | 0;
            img.data[i + 1] = (r() * 256) | 0;
            img.data[i + 2] = (r() * 256) | 0;
            img.data[i + 3] = 255;
          }
          cx.putImageData(img, 0, 0);
          return c.toDataURL("image/png");
        };
        const smoothNoise = (lowRes, outRes) => {
          const lc = document.createElement("canvas");
          lc.width = lc.height = lowRes;
          const lx = lc.getContext("2d");
          const img = lx.createImageData(lowRes, lowRes);
          const r = mulberry32(0xC0DE5EED);
          for (let i = 0; i < img.data.length; i += 4) {
            img.data[i] = (r() * 256) | 0;
            img.data[i + 1] = (r() * 256) | 0;
            img.data[i + 2] = (r() * 256) | 0;
            img.data[i + 3] = 255;
          }
          lx.putImageData(img, 0, 0);
          const oc = document.createElement("canvas");
          oc.width = oc.height = outRes;
          const ox = oc.getContext("2d");
          ox.imageSmoothingEnabled = true;
          ox.imageSmoothingQuality = "high";
          ox.drawImage(lc, 0, 0, outRes, outRes);
          return oc.toDataURL("image/png");
        };
        const lq = randomNoise(256, 256, 1);
        const mq = smoothNoise(16, 64);
        const hq = smoothNoise(8, 32);
        loaded["noise_lq"] = { data: lq };
        loaded["pw_noise_lq"] = { data: lq };
        loaded["noise_mq"] = { data: mq };
        loaded["pw_noise_mq"] = { data: mq };
        loaded["noise_hq"] = { data: hq };
        loaded["pw_noise_hq"] = { data: hq };
        loaded["rand00"] = { data: randomNoise(256, 256, 2) };
        loaded["rand01"] = { data: randomNoise(256, 256, 3) };
        loaded["rand02"] = { data: randomNoise(256, 256, 4) };
        visualizer.loadExtraImages(loaded);
        console.log(`[capture] loaded ${Object.keys(loaded).length} extra textures`);
      } catch (err) {
        console.warn("[capture] texture pack load failed:", err.message);
      }

      visualizer.loadPreset(presetData, 0);

      let running = true;
      const renderLoop = () => {
        if (!running) return;
        visualizer.render();
        requestAnimationFrame(renderLoop);
      };
      requestAnimationFrame(renderLoop);

      // Give butterchurn a few frames to settle before flagging ready.
      await new Promise((r) => setTimeout(r, 600));
      window.__prismReady = true;

      window.__prismStartCapture = (durationMs) => {
        const stream = canvas.captureStream(30);
        const chunks = [];
        const rec = new MediaRecorder(stream, {
          mimeType: "video/webm;codecs=vp9",
          videoBitsPerSecond: 4_000_000,
        });
        rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        rec.onstop = async () => {
          const blob = new Blob(chunks, { type: "video/webm" });
          const buf = await blob.arrayBuffer();
          const bytes = new Uint8Array(buf);
          // Spread-based String.fromCharCode blows the stack on multi-MB
          // payloads. Build base64 in 8K chunks.
          let binary = "";
          const CHUNK = 8192;
          for (let i = 0; i < bytes.length; i += CHUNK) {
            binary += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
          }
          window.__prismVideoBase64 = btoa(binary);
          window.__prismCaptureReady = true;
          running = false;
        };
        rec.start();
        setTimeout(() => rec.stop(), durationMs);
      };
    </script>
  </body>
</html>
