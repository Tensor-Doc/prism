# prism-swarm-relay — tiny WebSocket broadcast relay for prism's
# multi-user (shared) mode. Sized for demo loads (handfuls of peers,
# numeric cursor + audio packets at ~60 Hz each). Scale up by raising
# memory + bumping min_machines_running if you start sharing widely.

app = "prism-swarm-relay"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# Fly's edge terminates TLS and proxies wss:// upgrades to internal :8080.
[http_service]
  internal_port = 8080
  force_https = true
  # Single machine, auto-stops when idle. First viewer of a session may
  # see a sub-second cold start. Demand-scale by bumping min_machines_running.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
